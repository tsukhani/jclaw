# This is the main configuration file for the application.
# ~~~~~
application.name=JClaw
application.version=0.10.84

# Custom mime types (extensions not in Play's bundled mime-types.properties).
# Merged into play.libs.MimeTypes at startup via MimeTypes.initMimetypes.
mimetype.webp=image/webp
mimetype.md=text/plain

# JCLAW-131: modern image and audio formats the frontend composer accepts
# but Play's bundled mime-types.properties predates. Needed for two paths:
# (1) ApiChatController's reverse lookup picks the right on-disk extension
# for uploads whose sanitized filename has none; (2) serveWorkspaceFile
# emits the right Content-Type when the frontend pulls an attachment back
# for display. audio/x-flac is the de-facto sniffed MIME Tika returns for
# FLAC files even though the RFC-registered type is audio/flac.
mimetype.avif=image/avif
mimetype.heic=image/heic
mimetype.heif=image/heif
mimetype.m4a=audio/mp4
mimetype.aac=audio/aac
mimetype.flac=audio/x-flac
mimetype.opus=audio/opus
mimetype.weba=audio/webm

# JCLAW-177: Apache Tika TesseractOCRParser tunables — read by
# tools/DocumentsTool.readDocument on every parse. Enables text extraction
# from images and image-only PDFs by routing them through the tesseract
# binary (apt-get install tesseract-ocr on Debian/Ubuntu, brew install
# tesseract on macOS). A startup probe (jobs.TesseractProbeJob) logs WARN
# when the binary is missing so deployers see exactly what they lose.
# - ocr.tesseract.languages: tesseract -l value, e.g. "eng" or "eng+fra+jpn".
#   Additional language packs install separately (tesseract-ocr-fra,
#   tesseract-ocr-jpn, etc.).
# - ocr.tesseract.timeout:   per-image OCR timeout in seconds.
# - ocr.pdf.strategy:        PDFParser ocrStrategy — auto | no_ocr | ocr_only
#   | ocr_and_text_extraction. AUTO is the right default: text PDFs go through
#   the text extractor (no subprocess fork), and image-only PDFs fall through
#   to OCR. Override to ocr_and_text_extraction when scanned text and
#   embedded-image text both need extraction in the same pass.
ocr.tesseract.languages=eng
ocr.tesseract.timeout=60
ocr.pdf.strategy=auto

# JCLAW-132: override Play's legacy mp3=audio/mpeg3 mapping. Tika and every
# browser/OS sniff MP3 audio as audio/mpeg (the RFC-registered type);
# audio/mpeg3 is a 1990s-era string that survives in Play's bundled
# properties but appears nowhere in real traffic. The reverse lookup
# AgentRunner.userMessageFor does for OpenAI input_audio.format relies on
# a round-trip match between sniffed MIME and Play's forward mapping, so
# aligning this to audio/mpeg is what makes the audio content-part route
# produce format=mp3.
mimetype.mp3=audio/mpeg

# Application mode
# ~~~~~
# Set to dev to enable instant reloading and other development help.
# Otherwise set to prod.
application.mode=dev
%prod.application.mode=prod

# Secret key
# ~~~~~
# Used by Play to sign the PLAY_SESSION cookie. Anyone who knows this value
# can forge an admin session against an instance running with this config —
# our auth check (AuthCheck.java) trusts whatever PLAY_SESSION decrypts to.
#
# Resolved from the PLAY_SECRET environment variable, which jclaw.sh
# loads from a per-clone .env file (gitignored). Generate or rotate with:
#
#   ./jclaw.sh secret
#
# (Re)run after a fresh clone — `./jclaw.sh setup` does it automatically if
# .env doesn't exist yet. In production, set PLAY_SECRET in the
# launcher (systemd unit, Docker -e, etc.) or drop a .env in the deploy
# directory; either way, jclaw.sh sources it before invoking play.
application.secret=${PLAY_SECRET}

# i18n
# ~~~~~
# Define locales used by your application.
# You can then place localized messages in conf/messages.{locale} files
# application.langs=fr,en,ja

# Date format
# ~~~~~
date.format=yyyy-MM-dd
# date.format.fr=dd/MM/yyyy

# Server configuration
# ~~~~~
# If you need to change the HTTP port, uncomment this (default is set to 9000)
http.port=9000
#
# By default the server listen for HTTP on the wildcard address.
# You can restrict this.
# http.address=127.0.0.1
#
# Use this if you don't host your Play application at the root of the domain
# you're serving it from. This parameter has no effect when deployed as a
# war, because the path will be handled by the application server.
# http.path=/

# Maximum request body size (default 10MB)
# JCLAW-131: raised from 10 MB to 512 MB so operators can attach large
# audio recordings and document files without running into the Netty
# transport-layer cap before our per-kind ConfigService limits get a
# chance to enforce. This key is read once at framework startup and
# cannot be changed at runtime; the three upload.max{Image,Audio,File}Bytes
# keys are the real gate and can be tuned live through Settings.
play.netty.maxContentLength=536870912

# Session configuration
# ~~~~~~~~~~~~~~~~~~~~~~
# By default, session will be written to the transient PLAY_SESSION cookie.
# The cookies are not secured by default, only set it to true
# if you're serving your pages through https.
# application.session.cookie=PLAY
# application.session.maxAge=1h
# application.session.secure=false

# Session/Cookie sharing between subdomain
# ~~~~~~~~~~~~~~~~~~~~~~
# By default a cookie is only valid for a specific domain. By setting
# application.defaultCookieDomain to '.example.com', the cookies
# will be valid for all domains ending with '.example.com', ie:
# foo.example.com and bar.example.com
# application.defaultCookieDomain=.example.com

# JVM configuration
# ~~~~~
# Define which port is used by JPDA when application is in debug mode (default is set to 8000)
jpda.port=8100
#
# Java source level => 17, 18, 19, 20, 21, 22, 23, 24, 25
java.source=25

# Log level
# ~~~~~
# Specify log level for your application.
# If you want a very customized log, create a log4j.properties file in the conf directory
application.log=INFO
application.log.path=/log4j2.xml
#
# More logging configuration
# application.log.system.out=off
%prod.application.log.path=/log4j2-prod.xml

# Database configuration
# ~~~~~
# Development: H2 file-based database (persists across restarts).
# Don't add ;DB_CLOSE_ON_EXIT=FALSE — H2 rejects it when AUTO_SERVER=TRUE
# is set (error 50100, "Feature not supported"). AUTO_SERVER promotes one
# JVM to a TCP server so other clients can attach to the file DB, and
# leaving that server alive past JVM exit would strand its clients. So
# the H2-vs-Play shutdown race that produces a noisy "Database is already
# closed" stacktrace from ShutdownJob during JVM exit can NOT be silenced
# at the URL layer. The trace is cosmetic; if it ever masks a real
# startup error, fix it in jobs/ShutdownJob (skip JPA work, or change
# how the @OnApplicationStop hook wraps it), not here.
db.url=jdbc:h2:file:./data/jclaw;MODE=MYSQL;AUTO_SERVER=TRUE
db.driver=org.h2.Driver
jpa.ddl=update

# Connection pool
db.pool.minSize=5
db.pool.maxSize=20
db.pool.timeout=10000

%prod.db.pool.maxSize=30
%prod.db.pool.timeout=5000

# Production: PostgreSQL (uncomment and configure for production deployment)
# %prod.db.url=jdbc:postgresql://localhost:5432/jclaw
# %prod.db.driver=org.postgresql.Driver
# %prod.db.user=jclaw
# %prod.db.pass=${DB_PASSWORD}
# %prod.jpa.ddl=update
# %prod.application.baseUrl=https://yourdomain.com/

# # database isolation configuration
# # Valid values are NONE, READ_UNCOMMITTED, READ_COMMITTED, REPEATABLE_READ, SERIALIZABLE,
# # or an integer value to be passed to java.sql.Connection.setTransactionIsolation().
# # Note that not all databases support all transaction isolation levels.
# # Default: database dependent, usually READ_COMMITTED
# db.default.isolation=SERIALIZABLE

# JPA Configuration (Hibernate)
# ~~~~~
#
# Specify the custom JPA dialect to use here (default to guess):
# jpa.default.dialect=org.hibernate.dialect.PostgreSQLDialect
#
# Specify the ddl generation pattern to use. Set to none to disable it 
# (default to update in DEV mode, and none in PROD mode):
# jpa.default.ddl=update
#
# Debug SQL statements (logged using DEBUG level):
# jpa.default.debugSQL=true
#
# You can even specify additional hibernate properties here:
# hibernate.default.use_sql_comments=true
# ...
# org.hibernate.default.flushMode
# jakarta.persistence.default.flushMode
#
# Disable second-level cache (no benefit without a distributed cache provider)
hibernate.cache.use_second_level_cache=false
#
# Let Hibernate apply additive schema changes in production. The project is
# still pre-1.0 and uses H2 file storage, so matching dev's 'update' behavior
# avoids "table not found" errors whenever a new @Entity is introduced.
# Column type changes and renames still need manual intervention — when the
# schema stabilises we'll move to db.evolution or a real migration tool.
%prod.jpa.ddl=update

# Store path for Blob content
attachments.path=data/attachments

# Memcached configuration
# ~~~~~ 
# Enable memcached if needed. Otherwise a local cache is used.
# memcached=enabled
#
# Specify memcached host (default to 127.0.0.1:11211)
# memcached.host=127.0.0.1:11211
#
# Or you can specify multiple host to build a distributed cache
# memcached.1.host=127.0.0.1:11211
# memcached.2.host=127.0.0.1:11212
#
# Use plain SASL to authenticate for memcached
# memcached.user=
# memcached.password=

# HTTP Response headers control for static files
# ~~~~~
# Set the default max-age, telling the user's browser how long it should cache the page.
# Default is 3600 (one hour). Set it to 0 to send no-cache.
# This is only read in prod mode, in dev mode the cache is disabled.
# http.cacheControl=3600

# If enabled, Play will generate entity tags automatically and send a 304 when needed.
# Default is true, set it to false to deactivate use of entity tags.
# http.useETag=true

# Custom mime types
# mimetype.xpi=application/x-xpinstall

# WS configuration
# ~~~~~
# Default engine is Async Http Client, uncomment to use
# the JDK's internal implementation
# webservice = urlfetch
# If you need to set proxy params for WS requests
# http.proxyHost = localhost
# http.proxyPort = 3128
# http.proxyUser = jojo
# http.proxyPassword = jojo

# Mail configuration
# ~~~~~ 
# Default is to use a mock Mailer
mail.smtp=mock

# Or, specify mail host configuration
# mail.smtp.host=127.0.0.1
# mail.smtp.user=admin
# mail.smtp.pass=
# mail.smtp.channel=ssl

# Url-resolving in Jobs
# ~~~~~~
# When rendering templates with reverse-url-resoling (@@{..}) in Jobs (which do not have an inbound Http.Request),
# ie if sending a HtmlMail, Play need to know which url your users use when accessing your app.
# %test.application.baseUrl=http://localhost:9000/
# %prod.application.baseUrl=http://www.yourdomain.com/

# Templates additional precompilation
# ~~~~~~
# yaml files can use template expressions and are located in the conf folder.
# The default precompile task will not pickup those files.
# You can manually add some files with the following property
# (default: system property play.templates.compile, fallback system environment PLAY_TEMPLATES_COMPILE)
# play.templates.compile=conf/initialdata.yml;{module:reporting}test/reporting/unittests/export.yml
#
# Override the path separator if you want to use the Play!-module notation like {module:modname} on unix.
# (default: system property path.separator)
# play.templates.compile.path.separator=;

# Jobs executor
# ~~~~~~
# Size of the Jobs pool
# play.jobs.pool=10

# Netty pipeline configuration (advanced settings)
# You can default netty settings by overriding the following line. Each handler must be comma separated.
# The last value must be the PlayHandler class (or your own that extends PlayHandler)
# Default values are (Netty 4)
# play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For example, to enable Netty response compression (jclaw enables this — see active line below):
# play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.codec.http.HttpContentCompressor,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For SSL, use the play.ssl.netty.pipeline property
# play.ssl.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.codec.http.HttpContentCompressor,io.netty.handler.stream.ChunkedWriteHandler,play.server.ssl.SslPlayHandler
#
# StreamChunkAggregator behaviour:
#   play.netty.spoolThresholdBytes — bodies above this threshold are spooled to a temp file
#                                    (default 1048576 / 1 MB). Bodies under it stay in memory.
#   play.netty.maxContentLength    — hard cap; requests above this return 413. -1 (default) = unlimited.
#
# HttpContentCompressor tuning (only applies when HttpContentCompressor is in play.netty.pipeline).
# Active codecs: gzip + deflate (always); brotli (brotli4j ships with the fork — always on);
# zstd (only if zstd-jni is added to conf/dependencies.yml — currently off). The fork's pipeline
# factory wires the compressor with explicit StandardCompressionOptions so brotli/zstd auto-enable
# alongside gzip/deflate; Netty's no-arg HttpContentCompressor() ctor would give gzip+deflate only.
#
#   play.netty.compression.contentSizeThreshold — skip compression for responses smaller than
#                                                  this many bytes (default 0 = always try).
#                                                  Useful to avoid the gzip-overhead-on-tiny-
#                                                  payload pattern (e.g., 71 → 88 B JSON).
#   play.netty.compression.gzip.level    — zlib level 1–9 (default 6). Higher = better ratio,
#                                          more CPU.
#   play.netty.compression.deflate.level — same as above for raw deflate (default 6).
#   play.netty.compression.brotli.quality — Brotli quality 0–11 (default 4). q=0–4 fast,
#                                            q=6–8 typical sweet spot for runtime, q=11 is
#                                            offline-only (often 50× slower).
# Zstd has no level tunable: the fork calls StandardCompressionOptions.zstd() with no args, so
# its compression level is whatever Netty's default is and cannot be configured here.
# Out-of-range values are clamped to the supported range and logged at WARN.
play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.codec.http.HttpContentCompressor,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler

# Disable compression in test mode so functional-test assertions can read raw response bytes
# without gzip/brotli-decompressing first. Mirrors the framework default pipeline minus the
# HttpContentCompressor handler.
%test.play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler

# Compress everything — even tiny first events. The framework wraps streamed responses (SSE,
# Response.direct(InputStream)) as HttpChunkedInput so chunks flow through HttpContentCompressor
# as HttpContent, which means brotli/gzip build a streaming dictionary across the response.
# The big SSE wins come from that sliding window — repeated event prefixes like
# `data: {"type":"token","content":"` collapse to a few bits each after the first occurrence.
# Setting any threshold > 0 would skip the first event and forfeit the window setup.
# Trade: tiny FullHttpResponse JSON (e.g., 71 B /api/status) inflates ~17 B from gzip framing.
# That's negligible at our scale and worth it for the SSE compression gain.
play.netty.compression.contentSizeThreshold = 0

# Brotli quality 8: measured on the 186 KB JS chunk, q=8 lands at 68.7 KB vs q=4 (default)
# 73.3 KB and gzip-6 70.7 KB — q=8 is the point where brotli starts pulling its weight on
# this codebase. q=11 saves ~3 KB more but compression CPU climbs sharply (often 10× q=8).
play.netty.compression.brotli.quality = 8

# Gzip + deflate levels stay at the zlib default (6). Uncomment and tune if you specifically
# want a CPU/ratio tradeoff on those codecs — modern browsers prefer brotli when offered, so
# the gzip path mostly serves clients that don't accept br (curl without -H, older proxies).
# play.netty.compression.gzip.level    = 6
# play.netty.compression.deflate.level = 6

# # X509 certificates
# # the following values are default values
certificate.key.file=certs/host.key
# # certificate.password used only if certificate.key.file is password protected
# certificate.password=secret
certificate.file=certs/host.cert

# Open file from errors pages
# ~~~~~
# If your text editor supports opening files by URL, Play! will
# dynamically link error pages to files 
#
# Example, for textmate:
# play.editor=txmt://open?url=file://%s&line=%s

# Testing. Set up a custom configuration for test mode
# ~~~~~
#%test.module.cobertura=${play.path}/modules/cobertura
%test.module.testrunner=${play.path}/modules/testrunner
%test.http.port=9100
%test.application.mode=dev
%test.db.url=jdbc:h2:mem:play;MODE=MYSQL;LOCK_MODE=0
%test.jpa.ddl=create
%test.mail.smtp=mock
%test.jclaw.skills.path=tmp/test-skills

# JaCoCo Java agent loads into the test JVM under %test only. `play auto-test`
# honors `javaagent.path` as a framework convention, attaches the agent at
# startup, and the agent writes `jacoco.exec` at JVM shutdown. A follow-up
# `java -jar bin/jacococli.jar report jacoco.exec --xml jacoco.xml ...` run in
# the Jenkinsfile converts the binary into Sonar-readable XML at the path
# referenced by `sonar.coverage.jacoco.xmlReportPaths` in conf/sonar.properties.
# Agent exclusions live in conf/jacoco-agent.properties.
%test.javaagent.path=bin/jacocoagent.jar

# =============================================================================
# JClaw Configuration
# =============================================================================

# Admin username (display only — the password is stored as a PBKDF2 hash in
# the Config table under `auth.admin.passwordHash` and is set via the in-app
# setup screen on first boot. There is no conf-based password fallback; if
# the Config row is absent, the frontend routes to /setup-password.)
# ~~~~~
jclaw.admin.username=admin

# Workspace root path
# ~~~~~
jclaw.workspace.path=workspace
%test.jclaw.workspace.path=workspace-test

# Memory backend
# ~~~~~
# Options: jpa (default), neo4j
memory.backend=jpa

# JPA memory backend — pgvector support (PostgreSQL only)
# memory.jpa.vector.enabled=false
# memory.jpa.vector.provider=openai
# memory.jpa.vector.model=text-embedding-3-small
# memory.jpa.vector.dimensions=1536

# Neo4j memory backend (when memory.backend=neo4j)
# memory.neo4j.uri=bolt://localhost:7687
# memory.neo4j.user=neo4j
# memory.neo4j.password=secret

# Task poller interval
# ~~~~~
jclaw.tasks.poller.interval=30s

# Event log retention (days)
# ~~~~~
jclaw.logs.retention.days=30

# Load testing harness
# ~~~~~
# Disabled by default. When enabled, POST /api/metrics/loadtest drives
# synthetic concurrent traffic against /api/chat/stream using an in-process
# mock LLM provider bound to loopback only. Do NOT enable in production —
# the harness bypasses the normal "use real provider" path by auto-creating
# a __loadtest__ agent wired to the mock server.
provider.loadtest-mock.port=19999
provider.loadtest-mock.maxConcurrency=100
provider.loadtest-mock.maxIterations=50

# Tool-related configuration (tool enablement, allowlists, scanners, timeouts,
# etc.) is NOT defined here. It lives in the Config DB, seeded on first boot by
# DefaultConfigJob.seedToolConfig() and editable at runtime via the Settings UI
# (/api/config). Keep application.conf free of tool settings so the deploy-time
# infrastructure config and the runtime tool config never get confused.

https.port=9443
# Disable HTTPS in test mode. FirePhoque uses HTTP only; -1 is the
# framework's "don't listen" sentinel so the test JVM doesn't try to
# bind 9443 alongside a running dev server.
%test.https.port=-1
