# This is the main configuration file for the application.
# ~~~~~
application.name=JClaw
application.version=0.9.53

# Custom mime types (extensions not in Play's bundled mime-types.properties).
# Merged into play.libs.MimeTypes at startup via MimeTypes.initMimetypes.
mimetype.webp=image/webp
mimetype.md=text/plain

# Application mode
# ~~~~~
# Set to dev to enable instant reloading and other development help.
# Otherwise set to prod.
application.mode=dev
%prod.application.mode=prod

# Secret key
# ~~~~~
# The secret key is used to secure cryptographics functions
# If you deploy your application to several instances be sure to use the same key !
application.secret=6KTpUeAF2QaOjwdMAM7Pkc4BqVArZUISWOXXW5Ff9rFxfh88qIvP1HoiGdX3uZ1y

# i18n
# ~~~~~
# Define locales used by your application.
# You can then place localized messages in conf/messages.{locale} files
# application.langs=fr,en,ja

# Date format
# ~~~~~
date.format=yyyy-MM-dd
# date.format.fr=dd/MM/yyyy

# Server configuration
# ~~~~~
# If you need to change the HTTP port, uncomment this (default is set to 9000)
# http.port=9000
#
# By default the server listen for HTTP on the wildcard address.
# You can restrict this.
# http.address=127.0.0.1
#
# Use this if you don't host your Play application at the root of the domain
# you're serving it from. This parameter has no effect when deployed as a
# war, because the path will be handled by the application server.
# http.path=/

# Maximum request body size (default 10MB)
play.netty.maxContentLength=10485760

# Session configuration
# ~~~~~~~~~~~~~~~~~~~~~~
# By default, session will be written to the transient PLAY_SESSION cookie.
# The cookies are not secured by default, only set it to true
# if you're serving your pages through https.
# application.session.cookie=PLAY
# application.session.maxAge=1h
# application.session.secure=false

# Session/Cookie sharing between subdomain
# ~~~~~~~~~~~~~~~~~~~~~~
# By default a cookie is only valid for a specific domain. By setting
# application.defaultCookieDomain to '.example.com', the cookies
# will be valid for all domains ending with '.example.com', ie:
# foo.example.com and bar.example.com
# application.defaultCookieDomain=.example.com

# JVM configuration
# ~~~~~
# Define which port is used by JPDA when application is in debug mode (default is set to 8000)
jpda.port=8100
#
# Java source level => 17, 18, 19, 20, 21, 22, 23, 24, 25
java.source=25

# Log level
# ~~~~~
# Specify log level for your application.
# If you want a very customized log, create a log4j.properties file in the conf directory
application.log=INFO
application.log.path=/log4j2.xml
#
# More logging configuration
# application.log.system.out=off
%prod.application.log.path=/log4j2-prod.xml

# Database configuration
# ~~~~~
# Development: H2 file-based database (persists across restarts)
db.url=jdbc:h2:file:./data/jclaw;MODE=MYSQL;AUTO_SERVER=TRUE
db.driver=org.h2.Driver
jpa.ddl=update

# Connection pool
db.pool.minSize=5
db.pool.maxSize=20
db.pool.timeout=10000

%prod.db.pool.maxSize=30
%prod.db.pool.timeout=5000

# Production: PostgreSQL (uncomment and configure for production deployment)
# %prod.db.url=jdbc:postgresql://localhost:5432/jclaw
# %prod.db.driver=org.postgresql.Driver
# %prod.db.user=jclaw
# %prod.db.pass=${DB_PASSWORD}
# %prod.jpa.ddl=update
# %prod.application.baseUrl=https://yourdomain.com/

# # database isolation configuration
# # Valid values are NONE, READ_UNCOMMITTED, READ_COMMITTED, REPEATABLE_READ, SERIALIZABLE,
# # or an integer value to be passed to java.sql.Connection.setTransactionIsolation().
# # Note that not all databases support all transaction isolation levels.
# # Default: database dependent, usually READ_COMMITTED
# db.default.isolation=SERIALIZABLE

# JPA Configuration (Hibernate)
# ~~~~~
#
# Specify the custom JPA dialect to use here (default to guess):
# jpa.default.dialect=org.hibernate.dialect.PostgreSQLDialect
#
# Specify the ddl generation pattern to use. Set to none to disable it 
# (default to update in DEV mode, and none in PROD mode):
# jpa.default.ddl=update
#
# Debug SQL statements (logged using DEBUG level):
# jpa.default.debugSQL=true
#
# You can even specify additional hibernate properties here:
# hibernate.default.use_sql_comments=true
# ...
# org.hibernate.default.flushMode
# jakarta.persistence.default.flushMode
#
# Disable second-level cache (no benefit without a distributed cache provider)
hibernate.cache.use_second_level_cache=false
#
# Let Hibernate apply additive schema changes in production. The project is
# still pre-1.0 and uses H2 file storage, so matching dev's 'update' behavior
# avoids "table not found" errors whenever a new @Entity is introduced.
# Column type changes and renames still need manual intervention — when the
# schema stabilises we'll move to db.evolution or a real migration tool.
%prod.jpa.ddl=update

# Store path for Blob content
attachments.path=data/attachments

# Memcached configuration
# ~~~~~ 
# Enable memcached if needed. Otherwise a local cache is used.
# memcached=enabled
#
# Specify memcached host (default to 127.0.0.1:11211)
# memcached.host=127.0.0.1:11211
#
# Or you can specify multiple host to build a distributed cache
# memcached.1.host=127.0.0.1:11211
# memcached.2.host=127.0.0.1:11212
#
# Use plain SASL to authenticate for memcached
# memcached.user=
# memcached.password=

# HTTP Response headers control for static files
# ~~~~~
# Set the default max-age, telling the user's browser how long it should cache the page.
# Default is 3600 (one hour). Set it to 0 to send no-cache.
# This is only read in prod mode, in dev mode the cache is disabled.
# http.cacheControl=3600

# If enabled, Play will generate entity tags automatically and send a 304 when needed.
# Default is true, set it to false to deactivate use of entity tags.
# http.useETag=true

# Custom mime types
# mimetype.xpi=application/x-xpinstall

# WS configuration
# ~~~~~
# Default engine is Async Http Client, uncomment to use
# the JDK's internal implementation
# webservice = urlfetch
# If you need to set proxy params for WS requests
# http.proxyHost = localhost
# http.proxyPort = 3128
# http.proxyUser = jojo
# http.proxyPassword = jojo

# Mail configuration
# ~~~~~ 
# Default is to use a mock Mailer
mail.smtp=mock

# Or, specify mail host configuration
# mail.smtp.host=127.0.0.1
# mail.smtp.user=admin
# mail.smtp.pass=
# mail.smtp.channel=ssl

# Url-resolving in Jobs
# ~~~~~~
# When rendering templates with reverse-url-resoling (@@{..}) in Jobs (which do not have an inbound Http.Request),
# ie if sending a HtmlMail, Play need to know which url your users use when accessing your app.
# %test.application.baseUrl=http://localhost:9000/
# %prod.application.baseUrl=http://www.yourdomain.com/

# Templates additional precompilation
# ~~~~~~
# yaml files can use template expressions and are located in the conf folder.
# The default precompile task will not pickup those files.
# You can manually add some files with the following property
# (default: system property play.templates.compile, fallback system environment PLAY_TEMPLATES_COMPILE)
# play.templates.compile=conf/initialdata.yml;{module:reporting}test/reporting/unittests/export.yml
#
# Override the path separator if you want to use the Play!-module notation like {module:modname} on unix.
# (default: system property path.separator)
# play.templates.compile.path.separator=;

# Jobs executor
# ~~~~~~
# Size of the Jobs pool
# play.jobs.pool=10

# Execution pool
# ~~~~~
# play.pool is auto-sized at startup by plugins.PlayPoolAutoSizer (see
# conf/play.plugins) to max(8, Runtime.availableProcessors() * 2). This works
# uniformly across bare-metal, Docker, and Kubernetes — the JVM respects cgroup
# CPU limits via UseContainerSupport. Override by uncommenting the line below
# or passing -Dplay.pool=N at launch; the plugin defers to any explicit value.
#
# Test mode pins the pool to 3 so functional tests serialize predictably.
# play.pool=20
%test.play.pool=3

# Netty pipeline configuration (advanced settings)
# You can default netty settings by overriding the following line. Each handler must be comma separated.
# The last value must be the PlayHandler class (or your own that extends PlayHandler)
# Default values are
# play.netty.pipeline = play.server.FlashPolicyHandler,org.jboss.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,org.jboss.netty.handler.codec.http.HttpResponseEncoder,org.jboss.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For example, to enable Netty response compression
# play.netty.pipeline = play.server.FlashPolicyHandler,org.jboss.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,org.jboss.netty.handler.codec.http.HttpResponseEncoder,org.jboss.netty.handler.codec.http.HttpContentCompressor,org.jboss.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For SSL, use the play.ssl.netty.pipeline property
# play.ssl.netty.pipeline = play.server.FlashPolicyHandler,org.jboss.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,org.jboss.netty.handler.codec.http.HttpResponseEncoder,org.jboss.netty.handler.codec.http.HttpContentCompressor,org.jboss.netty.handler.stream.ChunkedWriteHandler,play.server.ssl.SslPlayHandler

# # X509 certificates
# # the following values are default values
# certificate.key.file=conf/host.key
# # certificate.password used only if certificate.key.file is password protected
# certificate.password=secret
# certificate.file=conf/host.cert
# trustmanager.algorithm=JKS
# keystore.algorithm=JKS
# keystore.password=secret
# keystore.file=conf/certificate.jks

# Open file from errors pages
# ~~~~~
# If your text editor supports opening files by URL, Play! will
# dynamically link error pages to files 
#
# Example, for textmate:
# play.editor=txmt://open?url=file://%s&line=%s

# Testing. Set up a custom configuration for test mode
# ~~~~~
#%test.module.cobertura=${play.path}/modules/cobertura
%test.module.testrunner=${play.path}/modules/testrunner
%test.http.port=9100
%test.application.mode=dev
%test.db.url=jdbc:h2:mem:play;MODE=MYSQL;LOCK_MODE=0
%test.jpa.ddl=create
%test.mail.smtp=mock
%test.jclaw.skills.path=tmp/test-skills

# =============================================================================
# JClaw Configuration
# =============================================================================

# Admin credentials
# ~~~~~
jclaw.admin.username=admin
jclaw.admin.password=changeme

# Workspace root path
# ~~~~~
jclaw.workspace.path=workspace
%test.jclaw.workspace.path=workspace-test

# Memory backend
# ~~~~~
# Options: jpa (default), neo4j
memory.backend=jpa

# JPA memory backend — pgvector support (PostgreSQL only)
# memory.jpa.vector.enabled=false
# memory.jpa.vector.provider=openai
# memory.jpa.vector.model=text-embedding-3-small
# memory.jpa.vector.dimensions=1536

# Neo4j memory backend (when memory.backend=neo4j)
# memory.neo4j.uri=bolt://localhost:7687
# memory.neo4j.user=neo4j
# memory.neo4j.password=secret

# Task poller interval
# ~~~~~
jclaw.tasks.poller.interval=30s

# Event log retention (days)
# ~~~~~
jclaw.logs.retention.days=30

# Load testing harness
# ~~~~~
# Disabled by default. When enabled, POST /api/metrics/loadtest drives
# synthetic concurrent traffic against /api/chat/stream using an in-process
# mock LLM provider bound to loopback only. Do NOT enable in production —
# the harness bypasses the normal "use real provider" path by auto-creating
# a __loadtest__ agent wired to the mock server.
provider.loadtest-mock.port=19999
provider.loadtest-mock.maxConcurrency=100
provider.loadtest-mock.maxIterations=50

# Tool-related configuration (tool enablement, allowlists, scanners, timeouts,
# etc.) is NOT defined here. It lives in the Config DB, seeded on first boot by
# DefaultConfigJob.seedToolConfig() and editable at runtime via the Settings UI
# (/api/config). Keep application.conf free of tool settings so the deploy-time
# infrastructure config and the runtime tool config never get confused.

