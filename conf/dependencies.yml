# Application dependencies

require:
    - play
    - play -> docviewer
    # jsoup 1.22.2 is one patch ahead of the 1.22.1 that Tika 3.3.0's
    # parent POM pins for its parser modules (code, html); declaring it
    # explicitly keeps the resolved classpath version and the declared
    # version in sync.
    - org.jsoup -> jsoup 1.22.2
    # Playwright's POM declares slf4j-simple as a runtime dep, which races
    # log4j-slf4j2-impl for the SLF4JServiceProvider ServiceLoader slot
    # (see JCLAW-88). Excluding it here eliminates the race; the
    # -Dslf4j.provider=... flag in jclaw.sh / Dockerfile becomes a no-op.
    - com.microsoft.playwright -> playwright 1.59.0:
        exclude:
            - org.slf4j -> slf4j-simple
    # Tika's Ivy POM declares bndlib and OSGi with `conf="provided->..."`
    # scope. Play 1.x's Ivy resolver treats `provided` as runtime, so
    # without these excludes ~13 OSGi/bndlib JARs (~5 MB) land on the
    # classpath unused. None are loaded by Tika's SPI parsers.
    - org.apache.tika -> tika-core 3.3.0:
        exclude:
            - javax.mail -> *
            - com.sun.mail -> *
            - javax.activation -> *
            - com.sun.activation -> *
            - org.apache.logging.log4j -> *
            - org.projectlombok -> *
            - org.assertj -> *
            - org.mockito -> *
            - biz.aQute.bnd -> *
            - org.osgi -> *
    - org.apache.tika -> tika-parsers-standard-package 3.3.0:
        exclude:
            - org.apache.lucene -> *
            - org.ow2.asm -> *
            - org.apache.cxf -> *
            - org.apache.httpcomponents -> *
            - org.apache.logging.log4j -> *
            - org.bouncycastle -> *
            - org.slf4j -> *
            - com.healthmarketscience.jackcess -> *
            - edu.ucar -> *
            - javax.mail -> *
            - com.sun.mail -> *
            - javax.activation -> *
            - com.sun.activation -> *
            - org.apache.tika -> tika-parser-mail-commons
            - org.apache.tika -> tika-parser-mail-module
            - org.projectlombok -> *
            - org.assertj -> *
            - org.mockito -> *
            - com.codeborne -> pdf-test
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            # pdfbox-tools ships two distinct things: (1) PDFBox CLI front-ends
            # (PDFDebugger, ExtractText, ...) which the app never invokes, and
            # (2) org.apache.pdfbox.tools.imageio.ImageIOUtil — a non-CLI helper
            # that Tika's ImageGraphicsEngine.writeToBuffer calls when
            # PDFParserConfig.extractInlineImages is true (JCLAW-177's
            # scanned-PDF OCR path). Excluding the whole artifact bricks PDF
            # OCR with NoClassDefFoundError, so we keep pdfbox-tools on the
            # classpath. picocli stays excluded — its only consumers are the
            # CLI front-end classes via @Command annotations, which Java
            # loads lazily; nothing on the OCR path touches them.
            - info.picocli -> *
            # Some parsers transitively pull org.osgi.core as a
            # service-registry dep we never consume — same story as the
            # bndlib chain on tika-core.
            - org.osgi -> *
    # flexmark pulls its own test utilities (flexmark-test-util,
    # flexmark-test-specs, flexmark-core-test) plus codeborne/pdf-test for
    # PDF rendering tests, which in turn drag AssertJ and hamcrest-core onto
    # the runtime classpath. None are referenced by jclaw source (/app or
    # /test) — tests use the JUnit 5 Jupiter API that Play's testrunner
    # provides. Excluding shrinks the runtime bundle without affecting
    # flexmark's Markdown → HTML rendering path.
    - com.vladsch.flexmark -> flexmark 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - com.codeborne -> pdf-test
            - org.assertj -> *
            - org.mockito -> *
            - org.projectlombok -> *
            # flexmark's POM declares jmh-core + jmh-generator-annprocess in
            # test scope for its benchmark harness. Play 1.x's Ivy resolver
            # promotes test→runtime, so they land in lib/ as dead weight.
            - org.openjdk.jmh -> *
    # Each flexmark-ext-* pulls flexmark-core-test transitively, which
    # in turn drags flexmark-test-util/specs, jmh-core, and hamcrest-core
    # onto the runtime classpath — regressing the excludes on the parent
    # `flexmark` artifact above. Replicate the exclude block on every
    # extension to keep the test-only graph off the runtime classpath.
    - com.vladsch.flexmark -> flexmark-ext-tables 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - org.openjdk.jmh -> *
            - org.hamcrest -> *
            - com.codeborne -> pdf-test
    - com.vladsch.flexmark -> flexmark-ext-gfm-strikethrough 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - org.openjdk.jmh -> *
            - org.hamcrest -> *
            - com.codeborne -> pdf-test
    - com.vladsch.flexmark -> flexmark-ext-gfm-tasklist 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - org.openjdk.jmh -> *
            - org.hamcrest -> *
            - com.codeborne -> pdf-test
    - com.vladsch.flexmark -> flexmark-ext-autolink 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - org.openjdk.jmh -> *
            - org.hamcrest -> *
            - com.codeborne -> pdf-test
    # Used directly by TelegramMarkdownFormatter. Arrives transitively
    # via the other flexmark-ext-* pulls today but is fragile if upstream
    # drops the dep — declare explicitly.
    - com.vladsch.flexmark -> flexmark-ext-typographic 0.64.8:
        exclude:
            - com.vladsch.flexmark -> flexmark-test-util
            - com.vladsch.flexmark -> flexmark-test-specs
            - com.vladsch.flexmark -> flexmark-core-test
            - org.openjdk.jmh -> *
            - org.hamcrest -> *
            - com.codeborne -> pdf-test
    # flying-saucer-pdf-openpdf is the other plausible transitive source of
    # pdf-test / AssertJ / hamcrest; narrow those too.
    - org.xhtmlrenderer -> flying-saucer-pdf-openpdf 9.4.0:
        exclude:
            - com.codeborne -> pdf-test
            - org.assertj -> *
            - org.hamcrest -> hamcrest-core
            - org.mockito -> *
            - org.projectlombok -> *
            # flying-saucer-pdf (pulled transitively through -openpdf)
            # declares slf4j-simple — same ServiceLoader-race story as
            # Playwright above.
            - org.slf4j -> slf4j-simple
    - org.hdrhistogram -> HdrHistogram 2.2.2
    # Pin junit-vintage-engine to match the platform (1.13.4) that the rest of the
    # JUnit graph resolves to. A transitive dep (pdf-test via flexmark-test) pulls
    # in vintage 5.9.3, which uses junit-platform-commons 1.9.x — the resulting
    # ClassFilter NoClassDefFoundError kills the TestRunner before any test runs.
    #
    # Vintage drags junit 4.13.2 → hamcrest-core 1.3 onto the runtime classpath.
    # No jclaw source imports org.hamcrest (Jupiter + Play's UnitTest only), so
    # hamcrest-core is dead weight. JUnit 4's Assert.assertThat(T, Matcher)
    # references Matcher reflectively; if play autotest goes red with
    # NoClassDefFoundError, drop this exclude.
    - org.junit.vintage -> junit-vintage-engine 5.14.4:
        exclude:
            - org.hamcrest -> hamcrest-core
    # Telegram Bot API SDK. telegrambots-client ships the OkHttpTelegramClient +
    # typed API models (SendMessage, Update, etc); telegrambots-longpolling is
    # the framework-agnostic runner used when transport=POLLING (no Spring).
    # telegrambots-meta is pulled transitively — no need to declare.
    - org.telegram -> telegrambots-client 9.5.0:
        exclude:
            - ch.qos.logback -> *
            - org.awaitility -> *
            # The SDK pulls okhttp 4.x under the pre-5.x artifact coord;
            # we exclude it so our direct okhttp-jvm 5.3.2 is the only
            # OkHttp on the classpath (package names are compatible —
            # classes still live under okhttp3.*).
            - com.squareup.okhttp3 -> okhttp
            # mockwebserver rides the same OkHttp 4.x graph and is a
            # test-only artifact; keep it off the runtime classpath.
            - com.squareup.okhttp3 -> mockwebserver
            - com.squareup.okio -> *
            - org.projectlombok -> *
            - org.assertj -> *
            - org.mockito -> *
    - org.telegram -> telegrambots-longpolling 9.5.0:
        exclude:
            - ch.qos.logback -> *
            - org.awaitility -> *
            - com.squareup.okhttp3 -> okhttp
            - com.squareup.okhttp3 -> mockwebserver
            - com.squareup.okio -> *
            - org.projectlombok -> *
            - org.assertj -> *
            - org.mockito -> *
    # OkHttp 5.x for WebFetchTool's SSRF-safe Dns plug-in. 5.x splits the
    # artifact by platform (okhttp-jvm / okhttp-android / okhttp-js) and
    # the root `okhttp` artifact is Gradle Metadata only — Play 1.x's Ivy
    # doesn't understand that format, so the JVM classes must be requested
    # via okhttp-jvm directly. The Telegram SDK pulls okhttp 4.12.0
    # transitively; declaring okhttp-jvm 5.3.2 here forces Ivy to upgrade
    # that dep so the classpath stays single-versioned on 5.x.
    - com.squareup.okhttp3 -> okhttp-jvm 5.3.2
    # JCLAW-185: okhttp-sse for the parallel OkHttp streaming chat path
    # behind play.llm.client=okhttp. Unlike okhttp itself this artifact ships
    # as a plain (non-multiplatform) POM that declares a runtime dep on
    # okhttp-jvm, so the unsuffixed coord is the right one — `okhttp-sse-jvm`
    # does not exist on Maven Central.
    - com.squareup.okhttp3 -> okhttp-sse 5.3.2
    # JCLAW-185: MockWebServer 5.x — the okhttp-5-era replacement for the
    # legacy `mockwebserver` artifact that the Telegram SDK exclusions
    # already block. Same plain-POM shape as okhttp-sse above. Drives the
    # SSE byte-identical fixture in OkHttpLlmDriverTest.
    - com.squareup.okhttp3 -> mockwebserver3 5.3.2
