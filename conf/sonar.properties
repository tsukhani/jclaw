# must be unique in a given SonarQube instance
sonar.projectKey=abundent:jclaw
# this is the name and version displayed in the SonarQube UI. Was mandatory prior to SonarQube 6.1.
sonar.projectName=JClaw
# Overridden by the Jenkinsfile via -Dsonar.projectVersion=$(application.version)
# so each analysis run is tagged with the release it was run against.
sonar.projectVersion=v1

# Path is relative to the sonar.properties file. Both the Play backend
# (app/) and the Nuxt frontend (frontend/) are analyzed; SonarQube routes
# each file to the appropriate language analyzer (Java, TypeScript, Vue,
# CSS) automatically.
sonar.sources=app,frontend

# Exclude generated artifacts, dependency caches, runtime data, and
# vendored/third-party content. Groovy templates (app/views/**/*.html) stay
# out because Play renders them at request time rather than compiling into
# the precompiled/ tree Sonar analyzes, and Sonar's HTML analyzer misreads
# Play directives as invalid markup. frontend/test/** lives under
# sonar.sources=frontend AND sonar.tests=frontend/test, which would
# double-index each test file — the explicit exclusion carves the test
# subtree out of the main-source scan so the two walkers produce disjoint
# sets (the backend test/ dir is a sibling of app/, so it doesn't need
# the same treatment).
sonar.exclusions=**/node_modules/**, **/dist/**, **/.nuxt/**, **/.output/**, **/public/spa/**, **/precompiled/**, **/workspace/**, **/skills/**, app/views/**, frontend/test/**, **/*.md, **/*.txt, **/*.sh, **/*.xml, **/*.yaml, **/*.yml, **/*.properties, **/*.sql

sonar.tests=test,frontend/test
sonar.java.binaries=precompiled
sonar.java.libraries=lib/*.jar
sonar.java.test.libraries=lib/*.jar
sonar.coverage.jacoco.xmlReportPaths=jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.junit.reportPaths=test-result
sonar.dependencyCheck.htmlReportPath=dependency-check-report.html

# TypeScript strict-mode + Vue parser picks up the frontend tsconfig so
# type-aware analysis matches what vue-tsc does during pnpm typecheck.
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
# sonar.java.jdkHome is deliberately omitted so the scanner picks up the
# JDK resolved by the Jenkins `tools { jdk 'JDK25' }` block rather than a
# hardcoded path that can drift from the Jenkins tool installation.
sonar.java.source=25

# Per-rule issue suppressions. multicriteria entries are evaluated in order;
# each one is a (ruleKey, resourceKey-glob) pair that silences matching
# issues. Add new entries by extending the comma-separated key list (e1,
# e2, ...) and defining the matching .ruleKey + .resourceKey properties.
sonar.issue.ignore.multicriteria=e1
# S1220 (default package): every test/*.java file in this codebase lives in
# the default package per Play 1.x's test-runner convention. Adding a
# package declaration to a single test creates inconsistency without
# benefit; doing it across all 90 tests would touch every file with no
# functional change. Suppressed project-wide for the test/ tree only —
# main-source files (app/) still get flagged correctly.
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1220
sonar.issue.ignore.multicriteria.e1.resourceKey=test/*.java
# sonar.host.url is deliberately omitted; Jenkins injects it via
# withSonarQubeEnv('SonarQube'), which reads from Manage Jenkins → System →
# SonarQube servers. Keeping the URL in one place prevents drift if the
# Sonar server ever moves to a new domain.
