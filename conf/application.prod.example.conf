# JClaw Production Configuration Example
# ========================================
# Copy this to application.conf (or use %prod. prefixes in the main config)
# and fill in your actual values.

# Application
application.name=JClaw
application.mode=prod
application.secret=CHANGE_ME_TO_A_RANDOM_64_CHAR_STRING
application.baseUrl=https://yourdomain.com/

# Java source level
java.source=25

# Database — PostgreSQL
db.url=jdbc:postgresql://localhost:5432/jclaw
db.driver=org.postgresql.Driver
db.user=jclaw
db.pass=${DB_PASSWORD}
jpa.ddl=update

# =============================================================================
# JClaw Configuration
# =============================================================================

# Admin credentials (use environment variables in production)
jclaw.admin.username=${ADMIN_USERNAME}
jclaw.admin.password=${ADMIN_PASSWORD}

# Workspace
jclaw.workspace.path=workspace

# Memory backend: jpa (default) or neo4j
memory.backend=jpa

# pgvector support (requires PostgreSQL + pgvector extension)
# memory.jpa.vector.enabled=true
# memory.jpa.vector.provider=openai
# memory.jpa.vector.model=text-embedding-3-small
# memory.jpa.vector.dimensions=1536

# Neo4j (when memory.backend=neo4j)
# memory.neo4j.uri=bolt://localhost:7687
# memory.neo4j.user=neo4j
# memory.neo4j.password=${NEO4J_PASSWORD}

# Task poller
jclaw.tasks.poller.interval=30s

# Event log retention
jclaw.logs.retention.days=30

# =============================================================================
# Runtime Configuration (set via admin UI after first start)
# =============================================================================
# The following are configured in the database via the Settings page:
#
# LLM Providers:
#   provider.ollama-cloud.baseUrl = https://ollama.com/v1
#   provider.ollama-cloud.apiKey  = (your key)
#   provider.openrouter.baseUrl   = https://openrouter.ai/api/v1
#   provider.openrouter.apiKey    = (your key)
#   provider.openrouter.models    = [{"id":"openai/gpt-4.1","name":"GPT-4.1",...}]
#
# Channel Configs:
#   Configured via the Channels page in the admin UI
#
# Agent Bindings:
#   Configured via the Agents/Bindings pages in the admin UI

# =============================================================================
# Deployment Checklist
# =============================================================================
# 1. Create PostgreSQL database: createdb jclaw
# 2. Set environment variables: DB_PASSWORD, ADMIN_USERNAME, ADMIN_PASSWORD
# 3. Start Play: play start
# 4. Build & start Nuxt: cd frontend && pnpm install && pnpm build && node .output/server/index.mjs
# 5. Configure Nginx (see conf/nginx.example.conf)
# 6. Login to admin UI at https://yourdomain.com/login
# 7. Add LLM providers in Settings
# 8. Create agents in Agents page
# 9. Configure channels (Telegram/Slack/WhatsApp) in Channels page
# 10. Register webhook URLs with messaging platforms:
#     - Telegram: https://yourdomain.com/api/webhooks/telegram/{secret}
#     - Slack:    https://yourdomain.com/api/webhooks/slack
#     - WhatsApp: https://yourdomain.com/api/webhooks/whatsapp
