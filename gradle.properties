org.gradle.configuration-cache=true

# Gradle daemon JVM defaults are -Xms256m -Xmx512m, which is too small for
# Play 1.13.x project configuration: loading the Kotlin compiler, the play1
# plugin, and resolving the full Maven classpath blows past 512m and
# SIGKILLs the daemon mid-configure (silent exit, no Gradle error). 2g
# heap + 512m metaspace gives comfortable headroom for builds of this size.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
