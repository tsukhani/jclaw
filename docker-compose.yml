services:
  jclaw:
    image: ghcr.io/tsukhani/jclaw:latest
    pull_policy: always
    # Inject ./.env into the container's environment so application.conf's
    # ${PLAY_SECRET} placeholder resolves at boot. Compose refuses to start
    # if .env is missing, surfacing the misconfig loudly rather than booting
    # with an unresolved placeholder. Generate the file once via the
    # `bootstrap` service below — see the README's Docker section.
    env_file: .env
    ports:
      - "${JCLAW_PORT:-9000}:9000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./skills:/app/skills
    restart: unless-stopped
    # Liveness probe via bash's /dev/tcp — avoids pulling curl/wget back into
    # the runtime image just for a healthcheck. start_period gives Play time
    # to precompile, seed the DB, and bind :9000 on a cold boot.
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': >/dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # One-time secret bootstrap. Runs `play secret` inside the published image
  # to write a fresh PLAY_SECRET into ./.env on the host, so first-time
  # operators don't need a local Play install. Profile-gated so a stray
  # `compose up` can't trigger it and trample an existing secret — invoke
  # explicitly:
  #
  #     touch .env
  #     docker compose --profile bootstrap run --rm bootstrap
  #
  # The `touch` is required because Docker materializes a missing bind-mount
  # source as an empty directory, and `play secret` writes a regular file.
  bootstrap:
    image: ghcr.io/tsukhani/jclaw:latest
    pull_policy: always
    profiles: [bootstrap]
    volumes:
      - ./.env:/app/.env
    command: ["play", "secret"]
