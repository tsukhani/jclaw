services:
  jclaw:
    image: ghcr.io/tsukhani/jclaw:latest
    pull_policy: always
    # PLAY_SECRET is forwarded from the host environment (or the project's
    # auto-loaded .env, if one exists) via Compose's variable substitution.
    # The `:-` default keeps Compose happy when neither is set — the
    # container's entrypoint then auto-generates and persists a secret to
    # ./data/.play-secret on first boot. So `docker compose up -d` works on
    # a fresh extract with no prior setup.
    #
    # If you'd rather pin the secret yourself, write `PLAY_SECRET=<value>`
    # into a `.env` file at this directory; Compose will pick it up here
    # and the entrypoint will defer to it instead of generating one.
    environment:
      PLAY_SECRET: "${PLAY_SECRET:-}"
    ports:
      - "${JCLAW_PORT:-9000}:9000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - ./skills:/app/skills
    restart: unless-stopped
    # Liveness probe via bash's /dev/tcp — avoids pulling curl/wget back into
    # the runtime image just for a healthcheck. start_period gives Play time
    # to precompile, seed the DB, and bind :9000 on a cold boot.
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': >/dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
