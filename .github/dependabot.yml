# Dependabot configuration — schema version 2.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# What this watches:
#   1. /frontend/package.json + pnpm-lock.yaml — Vue/Nuxt/Vitest/etc.
#   2. /Dockerfile + /docker-compose.yml — production image base + ghcr pull
#   3. /.devcontainer/Dockerfile — dev container base + Node/Java/Play layers
#
# What it does NOT watch (and why):
#   - conf/dependencies.yml — Play 1.x's Ivy-style format isn't a recognized
#     ecosystem; manual maintenance until either Play 1.x ships a Maven POM
#     or someone wires up a Renovate regex/custom manager.
#   - .devcontainer/Dockerfile's ARG PLAY_VERSION — same reason; it's an
#     imperative shell variable inside a RUN line, not a declarative pin
#     Dependabot can recognize. We control this version (it's our own fork)
#     so we'll know about new Play releases at publish time.
#   - .github/workflows/*.yml — none in JClaw; CI lives in Jenkins.
#
# Behavior knobs:
#   - schedule.interval: weekly (Mondays in repo timezone) — quiet enough
#     to avoid notification fatigue, frequent enough to catch security
#     advisories within a working week.
#   - open-pull-requests-limit: 5 — backpressure cap. If five PRs pile up
#     unmerged, Dependabot stops opening new ones until the queue drains;
#     keeps the PR list scannable.
#   - groups: bundle related packages into one PR per ecosystem family
#     (Vue, Nuxt, ESLint, Stylelint, Tailwind, Vitest). Reduces noise
#     from the dozen-plus eslint plugins moving in lockstep.
#   - update-types in groups: only minor + patch get grouped; major bumps
#     land as individual PRs because they almost always need code changes
#     and shouldn't be reviewed alongside unrelated minor bumps.
#   - commit-message.prefix: "deps" matches the project's "<scope>: <msg>"
#     convention (e.g. "deps: bump vue from 3.5.32 to 3.5.33"). Keeps the
#     git log style consistent across human and bot commits.

version: 2

updates:
  # ─── Frontend (npm / pnpm) ─────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-*"
        update-types:
          - minor
          - patch
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "nuxi"
          - "h3"
        update-types:
          - minor
          - patch
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
        update-types:
          - minor
          - patch
      stylelint:
        patterns:
          - "stylelint"
          - "stylelint-*"
          - "postcss-*"
        update-types:
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - minor
          - patch
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@vue/test-utils"
          - "happy-dom"
        update-types:
          - minor
          - patch

  # ─── Production image ─────────────────────────────────────────
  # Watches Dockerfile (FROM line) AND docker-compose.yml (image: line)
  # at the repo root. Bumps the Ubuntu base + the ghcr.io/tsukhani/jclaw
  # tag if either one is pinned to a specific version.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps

  # ─── Dev container image ──────────────────────────────────────
  # Watches .devcontainer/Dockerfile's FROM ubuntu:26.04 line. Won't
  # pick up the apt/NodeSource/curl-from-GitHub install steps — those
  # are imperative and outside Dependabot's recognition. JDK 25 / Node
  # 24 / Play 1.11.x bumps are manual.
  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
